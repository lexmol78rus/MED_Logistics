services:
  postgres:
    image: postgres:16-alpine
    container_name: med_warehouse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: med_warehouse
    ports:
      - "5432:5432"
    volumes:
      - med_warehouse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: med_warehouse_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      API_PREFIX: api/v1
      LOG_LEVEL: info
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/med_warehouse?schema=public
      JWT_ACCESS_SECRET: development-only-access-secret-min-32-characters-long
      JWT_REFRESH_SECRET: development-only-refresh-secret-min-32-characters-long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      THROTTLE_TTL: "60"
      THROTTLE_LIMIT: "100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/v1/health/live',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  med_warehouse_pg: {}
